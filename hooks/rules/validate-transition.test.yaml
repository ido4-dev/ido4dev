# Test fixtures for validate-transition.rules.yaml.
#
# Format: list of cases, each specifying a profile + input event + expected
# fired rule IDs + optional assertions on emit fields. The integration runner
# walks this file through hooks/lib/rule-runner.js evaluate(), no LLM.
#
# Coverage target: ≥2 positive cases per rule per profile + negative cases.

rule_file: validate-transition.rules.yaml
cases:
- name: 'hydro: canProceed=false fires VT001'
  profile: hydro
  input:
    tool_input:
      issueNumber: 42
      transition: approve
    tool_response:
      success: true
      data:
        canProceed: false
        transition: approve
        reason: Task not in review state
        details:
        - stepName: StateGate
          passed: false
          message: Expected IN_REVIEW, got IN_PROGRESS
          severity: error
        suggestions: []
        metadata:
          totalSteps: 1
          failedSteps: 1
          warnedSteps: 0
          executionTimeMs: 10
  expect:
    fired:
    - VT001_blocked_by_bre
    severity: warning
    title_contains: BRE blocked
    body_contains: Expected IN_REVIEW
- name: 'hydro: multiple failed steps still produces one VT001 with full context'
  profile: hydro
  input:
    tool_input:
      issueNumber: 42
      transition: complete
    tool_response:
      success: true
      data:
        canProceed: false
        transition: complete
        reason: Multiple governance gates failed
        details:
        - stepName: StateGate
          passed: false
          message: Expected IN_REVIEW
          severity: error
        - stepName: DependencyGate
          passed: false
          message: 'Upstream #40 not Done'
          severity: error
        - stepName: QualityGate
          passed: false
          message: Coverage below threshold
          severity: error
        suggestions:
        - 'Transition #40 first'
        - Re-run tests
        metadata:
          totalSteps: 3
          failedSteps: 3
          warnedSteps: 0
          executionTimeMs: 42
  expect:
    fired:
    - VT001_blocked_by_bre
    body_contains: DependencyGate
- name: 'scrum: canProceed=false fires VT001 (profile-universal)'
  profile: scrum
  input:
    tool_input:
      issueNumber: 101
      transition: start
    tool_response:
      success: true
