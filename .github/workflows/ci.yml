name: Validate Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  structure:
    name: Plugin Structure (121 assertions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run plugin validation suite
        run: bash tests/validate-plugin.sh

      - name: Run Claude Code native validation
        run: |
          npm install -g @anthropic-ai/claude-code
          claude plugin validate .

  compatibility:
    name: MCP Server Compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install MCP server dependency
        run: npm install

      - name: Run compatibility test
        run: node tests/compatibility.mjs
