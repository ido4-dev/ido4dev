        - Investigate BRE failures
        - Close open quality gates
        metadata:
          totalTransitions: 48
          totalTasks: 30
          computedAt: '2026-04-21T12:00:00Z'
  expect:
    fired:
    - CS001_grade_drop
    - CS002_category_threshold_crossed
    state_after_merge:
      last_compliance:
        grade: C
        score: 65
