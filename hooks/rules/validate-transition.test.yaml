          message: Sprint WIP at 5/5
          severity: error
        suggestions: []
        metadata:
          totalSteps: 1
          failedSteps: 1
          warnedSteps: 0
          executionTimeMs: 8
  expect:
    fired:
    - VT001_blocked_by_bre
    title_contains: '#101'
