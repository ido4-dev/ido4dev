# Test fixtures for complete-and-handoff.rules.yaml.

rule_file: complete-and-handoff.rules.yaml
cases:
- name: 'hydro: completing a task unblocks 2 downstream → CH001 fires'
  profile: hydro
  input:
    tool_input:
      issueNumber: 42
      agentId: alpha
    tool_response:
      success: true
      data:
        completed:
          issueNumber: 42
          title: Implement auth middleware
        newlyUnblocked:
        - issueNumber: 43
          title: Wire middleware into router
          recommendedAgent: beta
          reasoning: beta matches coding capability
        - issueNumber: 45
          title: Document middleware for consumers
          recommendedAgent: gamma
          reasoning: gamma matches documentation capability
        agentNextTask:
          recommendation:
            issueNumber: 43
            title: Wire middleware into router
            score: 55
            reasoning: Highest downstream leverage
            scoreBreakdown:
              cascadeValue: 25
              epicMomentum: 15
              capabilityMatch: 10
              dependencyFreshness: 5
          alternatives: []
          context:
            activeContainer: Wave 3
            agentId: alpha
            lockedTasks: []
            totalCandidates: 2
  expect:
    fired:
    - CH001_cascade_unblock
    - CH002_strong_next_recommendation
    title_contains: unblocks 2
    body_contains: '#43'
