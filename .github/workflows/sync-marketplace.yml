name: Sync Marketplace

# Gated on CI passing — never publishes a commit that failed validation.
# Sync is idempotent (skips if marketplace already matches), so it's safe
# to fire on every successful CI run, not just version-changing pushes.
# workflow_dispatch is provided as a manual escape hatch.
on:
  workflow_run:
    workflows: ["Validate Plugin"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    steps:
      - name: Checkout ido4dev (the SHA CI validated)
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          path: source

      - name: Read version from plugin.json
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('source/.claude-plugin/plugin.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Plugin version: $VERSION"

      # MARKETPLACE_TOKEN is a PAT scoped to the ido4-plugins repo.
      # If this step fails with HTTP 401/403, the token has likely expired —
      # regenerate at github.com/settings/tokens and update the repo secret.
      - name: Checkout ido4-plugins marketplace
        uses: actions/checkout@v5
        with:
          repository: ido4-dev/ido4-plugins
          token: ${{ secrets.MARKETPLACE_TOKEN }}
          path: marketplace

      - name: Update marketplace version
        run: |
          python3 -c "
          import json
          path = 'marketplace/.claude-plugin/marketplace.json'
          d = json.load(open(path))
          for p in d['plugins']:
              if p['name'] == 'ido4dev':
                  p['version'] = '${{ steps.version.outputs.version }}'
          json.dump(d, open(path, 'w'), indent=2)
          "
          echo "Updated marketplace.json to v${{ steps.version.outputs.version }}"

      - name: Check for changes
        id: changes
        run: |
          cd marketplace
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No version change detected"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version change detected"
          fi

      - name: Commit and push marketplace
        if: steps.changes.outputs.changed == 'true'
        run: |
          cd marketplace
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git commit -m "ido4dev v${{ steps.version.outputs.version }}"
          git push

      - name: Create GitHub Release
        working-directory: source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists — skipping"
          else
            gh release create "$VERSION" \
              --title "$VERSION" \
              --generate-notes \
              --latest
          fi
